Name: user.rpc
ListenOn: 127.0.0.1:9081
Mode: pro
Log:
  ServiceName: user.rpc
  Mode: file     # 容器环境建议改为 volume 并挂载目录
  Path: logs/user-service
  Level: info
  Compress: true
  KeepDays: 14
  StackCooldownMillis: 100
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: user.rpc

# 链路追踪
Telemetry:
  Name: user.rpc
  Endpoint: localhost:4317
  Sampler: 0.1
  Batcher: otlpgrpc

# Prometheus 指标暴露
Prometheus:
  Host: 0.0.0.0
  Port: 9181
  Path: /metrics

MySQL:
  DataSource: root:Zz123456@tcp(localhost:3306)/seckill_mall?charset=utf8mb4&parseTime=True&loc=Local

MyCache:
  - Host: localhost:6379
    Type: node

JWTConfig:
  AccessSecret: seckill-mall-jwt-secret-key-2026
  RefreshSecret: seckill-mall-jwt-refresh-secret-key-2026
  AccessExpire: 900
  RefreshExpire: 604800
