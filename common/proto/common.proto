syntax = "proto3";

package common;

option go_package = "seckill-mall/common/common";

// 通用基础响应（用于无返回数据的 RPC）
message Empty {}

// 布尔响应
message BoolResponse {
    bool success = 1;
    string message = 2;
}

// ID 请求
message IdRequest {
    int64 id = 1;
}

// 批量 ID 请求
message BatchIdRequest {
    repeated int64 ids = 1;
}

// 通用分页请求
message PageRequest {
    int64 page = 1;
    int64 page_size = 2;
}

// 通用分页响应
message PageResponse {
    int64 total = 1;
    int64 page = 2;
    int64 page_size = 3;
}
