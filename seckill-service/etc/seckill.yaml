Name: seckill.rpc
ListenOn: 127.0.0.1:9083
Mode: pro
Log:
  ServiceName: seckill.rpc
  Mode: file     # 容器环境建议改为 volume 并挂载目录
  Path: logs/seckill-service
  Level: info
  Compress: true
  KeepDays: 14
  StackCooldownMillis: 100
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: seckill.rpc

# 链路追踪（上报到 Jaeger OTLP gRPC）
Telemetry:
  Name: seckill.rpc
  Endpoint: localhost:4317
  Sampler: 0.1
  Batcher: otlpgrpc

# Prometheus 指标暴露
Prometheus:
  Host: 0.0.0.0
  Port: 9183
  Path: /metrics

Redis:
  Host: localhost:6379
  Key: seckill.rpc.auth

SeckillRedis:
  Host: localhost:6379
  PoolSize: 256
  MinIdleConns: 32
  DialTimeoutMs: 200
  ReadTimeoutMs: 200
  WriteTimeoutMs: 200
  PoolTimeoutMs: 200

ProductMetaCache:
  Enabled: true
  RefreshSeconds: 3
  ScanCount: 500

Bloom:
  Type: bloom   # bloom / cuckoo
  Enabled: true
  ExpectedItems: 50000
  FalsePositiveRate: 0.001
  NegativeCacheTTLSeconds: 5
  FallbackVerifyEnabled: true

RabbitMQ:
  URL: amqp://guest:guest@localhost:5672/
  Exchange: seckill_exchange
  RoutingKey: seckill.order

AsyncProducer:
  BufferSize: 10000
  WorkerCount: 16
  RetryCount: 3
  RetryInterval: 1

LocalQuota:
  Enabled: false
  BatchSize: 200
  LowWatermark: 40
  LeaseTTLSeconds: 15
  HeartbeatSeconds: 5
  ReaperIntervalSeconds: 2
