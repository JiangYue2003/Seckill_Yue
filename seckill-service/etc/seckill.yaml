Name: seckill.rpc
ListenOn: 127.0.0.1:9083
Mode: pro
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: seckill.rpc

# 链路追踪（上报到 Jaeger OTLP gRPC）
Telemetry:
  Name: seckill.rpc
  Endpoint: localhost:4317
  Sampler: 0.1
  Batcher: otlpgrpc

# Prometheus 指标暴露
Prometheus:
  Host: 0.0.0.0
  Port: 9183
  Path: /metrics

Redis:
  Host: localhost:6379
  Key: seckill.rpc.auth

SeckillRedis:
  Host: localhost:6379

RabbitMQ:
  URL: amqp://guest:guest@localhost:5672/
  Exchange: seckill_exchange
  RoutingKey: seckill.order

AsyncProducer:
  BufferSize: 10000
  WorkerCount: 16
  RetryCount: 3
  RetryInterval: 1
