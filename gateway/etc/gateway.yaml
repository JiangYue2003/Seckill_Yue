Name: gateway
Host: 0.0.0.0
Port: 8888

# 链路追踪（上报到 Jaeger OTLP gRPC）
Telemetry:
  Name: gateway
  Endpoint: localhost:4317
  Sampler: 0.1
  Batcher: otlpgrpc

JWT:
  AccessSecret: seckill-mall-jwt-secret-key-2026
  AccessExpire: 900
  RefreshSecret: seckill-mall-jwt-refresh-secret-key-2026
  RefreshExpire: 604800

Redis:
  - Host: localhost:6379

RedisHost: localhost:6379

# 限流配置（秒杀接口）
# Strategy 可选值:
#   - token_bucket:    令牌桶(userId:productId维度,秒杀推荐)
#   - sliding_window:  滑动窗口(IP维度,原逻辑)
#   - ip_token_bucket: IP维度令牌桶(降级用)
RateLimit:
  Strategy: token_bucket  # 切换策略: token_bucket | sliding_window | ip_token_bucket
  QPS: 200                # 每秒放行速率
  Capacity: 500           # 令牌桶容量(突发上限)，滑动窗口忽略

# gRPC 服务（通过 etcd 服务发现，NonBlock=false 确保启动时等待连接就绪）
UserService:
  NonBlock: false
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc

ProductService:
  NonBlock: false
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: product.rpc

SeckillService:
  NonBlock: false
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: seckill.rpc

OrderService:
  NonBlock: false
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: order.rpc
